name: orbit

services:
  datacenter:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-p", "${DB_PORT:-5432}"]
    environment:
      POSTGRES_DB: ${DATABASE:?DATABASE is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
      DB_PORT: ${DB_PORT:-5432}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p $${DB_PORT}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - orbit_internal

  backend:
    build:
      context: ./ai_business_copilotbusi_be
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-datacenter}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASS: ${DB_PASS:?DB_PASS is required}
      DATABASE: ${DATABASE:?DATABASE is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      datacenter:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - orbit_internal

  frontend:
    build:
      context: ./ai_business_copilot
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - orbit_internal

volumes:
  postgres_data:

networks:
  orbit_internal:
    driver: bridge
